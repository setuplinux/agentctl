name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: agentctl-linux-amd64
          - goos: linux
            goarch: arm64
            asset: agentctl-linux-arm64
          - goos: darwin
            goarch: amd64
            asset: agentctl-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: agentctl-darwin-arm64
          - goos: windows
            goarch: amd64
            asset: agentctl-windows-amd64.exe
          - goos: windows
            goarch: arm64
            asset: agentctl-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -trimpath -ldflags "-s -w" -o "dist/${{ matrix.asset }}" ./cmd/agentctl
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          generate_release_notes: true
